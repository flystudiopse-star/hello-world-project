name: Link PR to Linear Issue

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  link-pr-to-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Extract PR info
        id: pr-info
        run: |
          echo "PR_TITLE=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "PR_URL=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          echo "PR_BODY=${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT

      - name: Find Linear Issue ID
        id: find-linear
        run: |
          PR_TITLE="${{ steps.pr-info.outputs.PR_TITLE }}"
          LINEAR_ID=$(echo "$PR_TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "Linear Issue ID: $LINEAR_ID"
          echo "linear_id=$LINEAR_ID" >> $GITHUB_OUTPUT

      - name: Update Linear Issue via API
        if: steps.find-linear.outputs.linear_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
        run: |
          LINEAR_ID="${{ steps.find-linear.outputs.linear_id }}"
          PR_URL="${{ steps.pr-info.outputs.PR_URL }}"
          PR_TITLE="${{ steps.pr-info.outputs.PR_TITLE }}"
          
          curl -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\":\"mutation IssueUpdate($id: String!, $input: IssueUpdateInput!) { issueUpdate(id: $id, input: $input) { success } }\", \"variables\": {\"id\": \"$LINEAR_ID\", \"input\": {\"description\": \"PR: $PR_URL\"}}}"

      - name: Add PR Link Comment
        if: steps.find-linear.outputs.linear_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          LINEAR_ID="${{ steps.find-linear.outputs.linear_id }}"
          PR_URL="${{ steps.pr-info.outputs.PR_URL }}"
          PR_TITLE="${{ steps.pr-info.outputs.PR_TITLE }}"
          
          curl -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\":\"mutation CommentCreate($input: CommentCreateInput!) { commentCreate(input: $input) { success } }\", \"variables\": {\"input\": {\"issueId\": \"$LINEAR_ID\", \"body\": \"**PR Linked:** [$PR_TITLE]($PR_URL)\"}}}"
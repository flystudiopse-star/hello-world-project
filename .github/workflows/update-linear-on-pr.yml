name: Update Linear on PR Changes

on:
  pull_request:
    types: [opened, synchronize, closed, reopened]

jobs:
  update-linear:
    runs-on: ubuntu-latest
    steps:
      - name: Extract PR Details
        id: pr-details
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          echo "pr_body=${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
          echo "pr_action=${{ github.event.action }}" >> $GITHUB_OUTPUT
          echo "pr_state=${{ github.event.pull_request.merged }}" >> $GITHUB_OUTPUT

      - name: Extract Linear Issue ID from PR title
        id: extract-linear
        run: |
          TITLE="${{ steps.pr-details.outputs.pr_title }}"
          LINEAR_ID=$(echo "$TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "linear_id=$LINEAR_ID" >> $GITHUB_OUTPUT

      - name: Extract Changes Description from PR
        id: changes
        run: |
          BODY="${{ steps.pr-details.outputs.pr_body }}"
          echo "$BODY" > /tmp/pr_body.md
          echo "description='$BODY'" >> $GITHUB_OUTPUT

      - name: Update Linear Issue with PR Link
        if: steps.extract-linear.outputs.linear_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          LINEAR_ID="${{ steps.extract-linear.outputs.linear_id }}"
          PR_URL="${{ steps.pr-details.outputs.pr_url }}"
          PR_TITLE="${{ steps.pr-details.outputs.pr_title }}"
          
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_API_KEY" \
            -d "{
              \"query\": \"
                mutation IssueUpdate(\$id: String!, \$input: IssueUpdateInput!) {
                  issueUpdate(id: \$id, input: \$input) {
                    success
                    issue {
                      description
                    }
                  }
                }
              \",
              \"variables\": {
                \"id\": \"$LINEAR_ID\",
                \"input\": {
                  \"description\": \"PR: $PR_URL\"
                }
              }
            }"

      - name: Add PR Status Comment to Linear
        if: steps.extract-linear.outputs.linear_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          LINEAR_ID="${{ steps.extract-linear.outputs.linear_id }}"
          PR_URL="${{ steps.pr-details.outputs.pr_url }}"
          PR_TITLE="${{ steps.pr-details.outputs.pr_title }}"
          ACTION="${{ steps.pr-details.outputs.pr_action }}"
          MERGED="${{ steps.pr-details.outputs.pr_state }}"
          
          if [ "$MERGED" == "true" ]; then
            STATUS="merged"
            EMOJI="✅"
          elif [ "$ACTION" == "opened" ]; then
            STATUS="opened"
            EMOJI="📝"
          elif [ "$ACTION" == "closed" ]; then
            STATUS="closed"
            EMOJI="❌"
          else
            STATUS="updated"
            EMOJI="🔄"
          fi
          
          curl -s -X POST "https://api.linear.app/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $LINEAR_API_KEY" \
            -d "{
              \"query\": \"
                mutation CommentCreate(\$input: CommentCreateInput!) {
                  commentCreate(input: \$input) {
                    success
                  }
                }
              \",
              \"variables\": {
                \"input\": {
                  \"issueId\": \"$LINEAR_ID\",
                  \"body\": \"$EMOJI **PR $STATUS:** [$PR_TITLE]($PR_URL)\"
                }
              }
            }"